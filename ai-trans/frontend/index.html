<!DOCTYPE html>
<html>
<head>
  <title>Audio Capture</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; background: #fff; color: #222; }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; }

    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .status { display: flex; align-items: center; gap: 8px; }
    #dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
    #status-label { font-size: 14px; color: #666; }
    .btn-row { display: flex; gap: 8px; }

    button {
      font-size: 13px; padding: 6px 14px; border-radius: 6px;
      border: 1px solid #ccc; background: #fff; cursor: pointer;
    }
    button:hover:not(:disabled) { background: #f5f5f5; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-start { border-color: #4caf50; color: #2e7d32; }
    #btn-stop  { border-color: #e24b4a; color: #c62828; }

    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
    .stat-card { background: #f7f7f7; border-radius: 8px; padding: 12px; }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-card .value { font-size: 22px; font-weight: 600; }
    #stat-emotion { font-size: 16px; }

    .transcript-panel { border: 1px solid #e0e0e0; border-radius: 10px; overflow: hidden; }
    .transcript-header {
      padding: 8px 14px; border-bottom: 1px solid #e0e0e0;
      display: flex; justify-content: space-between; align-items: center;
      background: #fafafa;
    }
    .transcript-header span { font-size: 13px; color: #888; }
    #transcript-box {
      padding: 14px; min-height: 200px; max-height: 360px;
      overflow-y: auto; font-size: 15px; line-height: 1.7; color: #333;
    }
    .placeholder { color: #bbb; font-size: 14px; }
    .chunk-entry { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
    .chunk-meta { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .chunk-text { font-size: 15px; }
    .error-entry { font-size: 13px; color: #c62828; margin-bottom: 8px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>

  <h1>🎙 Audio Capture</h1>

  <div class="topbar">
    <div class="status">
      <div id="dot"></div>
      <span id="status-label">Idle</span>
    </div>
    <div class="btn-row">
      <button id="btn-start" onclick="startCapture()">▶ Start capture</button>
      <button id="btn-stop"  onclick="stopCapture()" disabled>■ Stop</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Chunks sent</div>
      <div class="value" id="stat-chunks">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Emotion</div>
      <div class="value" id="stat-emotion" style="color:#aaa;">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Confidence</div>
      <div class="value" id="stat-conf" style="color:#aaa;">—</div>
    </div>
  </div>

  <div class="transcript-panel">
    <div class="transcript-header">
      <span>📄 Transcript</span>
      <button onclick="clearAll()">🗑 Clear</button>
    </div>
    <div id="transcript-box">
      <span class="placeholder">Transcript will appear here…</span>
    </div>
  </div>

<script>
let recorder, chunkCount = 0, headerBlob = null;

const EMOTION_LABELS = {
  ang: 'Angry 😠', hap: 'Happy 😊',
  neu: 'Neutral 😐', sad: 'Sad 😢',
  fea: 'Fear 😨',  dis: 'Disgust 🤢'
};

function setRecording(on) {
  const dot = document.getElementById('dot');
  dot.style.background = on ? '#e24b4a' : '#ccc';
  dot.style.animation = on ? 'pulse 1.5s ease-in-out infinite' : 'none';
  document.getElementById('status-label').textContent = on ? 'Recording…' : 'Idle';
  document.getElementById('btn-start').disabled = on;
  document.getElementById('btn-stop').disabled = !on;
}

async function startCapture() {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    const audioOnly = new MediaStream(stream.getAudioTracks());
    recorder = new MediaRecorder(audioOnly);
    chunkCount = 0;
    headerBlob = null;

    // clear old placeholder
    document.getElementById('transcript-box').innerHTML = '';
    document.getElementById('stat-chunks').textContent = '0';
    document.getElementById('stat-emotion').textContent = '—';
    document.getElementById('stat-emotion').style.color = '#aaa';
    document.getElementById('stat-conf').textContent = '—';
    document.getElementById('stat-conf').style.color = '#aaa';

    recorder.ondataavailable = async (e) => {
      if (!e.data || e.data.size === 0) return;

      if (chunkCount === 0) headerBlob = e.data;

      chunkCount++;
      document.getElementById('stat-chunks').textContent = chunkCount;
      document.getElementById('status-label').textContent = 'Processing…';

      const blobToSend = chunkCount === 1
        ? e.data
        : new Blob([headerBlob, e.data], { type: 'audio/webm' });

      const formData = new FormData();
      formData.append('file', blobToSend, 'audio.webm');

      try {
        const resp = await fetch('http://127.0.0.1:8000/audio', { method: 'POST', body: formData });
        const res = await resp.json();
        document.getElementById('status-label').textContent = 'Recording…';
        appendTranscript(res.text, res.emotion);
        updateEmotion(res.emotion);
      } catch (err) {
        document.getElementById('status-label').textContent = 'Recording…';
        appendError('Server error: ' + err.message);
      }
    };

    stream.getTracks().forEach(t => t.onended = stopCapture);
    recorder.onstop = () => setRecording(false);
    recorder.start(10000);
    setRecording(true);

  } catch (err) {
    alert('Could not start capture: ' + err.message);
  }
}

function stopCapture() {
  if (recorder && recorder.state !== 'inactive') recorder.stop();
}

function clearAll() {
  document.getElementById('transcript-box').innerHTML =
    '<span class="placeholder">Transcript will appear here…</span>';
  chunkCount = 0;
  document.getElementById('stat-chunks').textContent = '0';
  document.getElementById('stat-emotion').textContent = '—';
  document.getElementById('stat-emotion').style.color = '#aaa';
  document.getElementById('stat-conf').textContent = '—';
  document.getElementById('stat-conf').style.color = '#aaa';
}

function appendTranscript(text, emotion) {
  if (!text || !text.trim()) return;
  const box = document.getElementById('transcript-box');
  const label = emotion ? (EMOTION_LABELS[emotion.label] || emotion.label) : '';
  const div = document.createElement('div');
  div.className = 'chunk-entry';
  div.innerHTML = `
    <div class="chunk-meta">Chunk ${chunkCount} &nbsp;${label}</div>
    <div class="chunk-text">${text.trim()}</div>
  `;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function appendError(msg) {
  const box = document.getElementById('transcript-box');
  const div = document.createElement('div');
  div.className = 'error-entry';
  div.textContent = '⚠ ' + msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function updateEmotion(emotion) {
  if (!emotion) return;
  const el = document.getElementById('stat-emotion');
  el.textContent = EMOTION_LABELS[emotion.label] || emotion.label;
  el.style.color = '#222';
  const conf = document.getElementById('stat-conf');
  conf.textContent = Math.round(emotion.score * 100) + '%';
  conf.style.color = '#222';
}
</script>

</body>
</html>
