<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; width: 360px; padding: 1rem; background: #fff; color: #222; }
    h1 { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .status { display: flex; align-items: center; gap: 8px; }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: #ccc; }
    #status-label { font-size: 13px; color: #666; }
    .btn-row { display: flex; gap: 6px; }
    button { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    button:hover:not(:disabled) { background: #f5f5f5; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-start { border-color: #4caf50; color: #2e7d32; }
    #btn-stop  { border-color: #e24b4a; color: #c62828; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
    .stat-card { background: #f7f7f7; border-radius: 8px; padding: 10px; }
    .stat-card .label { font-size: 11px; color: #888; margin-bottom: 3px; }
    .stat-card .value { font-size: 18px; font-weight: 600; }
    #stat-emotion { font-size: 13px; }
    .transcript-panel { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .transcript-header { padding: 6px 10px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; background: #fafafa; }
    .transcript-header span { font-size: 12px; color: #888; }
    #transcript-box { padding: 10px; min-height: 140px; max-height: 240px; overflow-y: auto; font-size: 13px; line-height: 1.6; color: #333; }
    .placeholder { color: #bbb; font-size: 13px; }
    .chunk-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .chunk-meta { font-size: 10px; color: #aaa; margin-bottom: 2px; }
    .error-entry { font-size: 12px; color: #c62828; margin-bottom: 6px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <h1>AI Live Translator</h1>

  <div class="topbar">
    <div class="status">
      <div id="dot"></div>
      <span id="status-label">Idle</span>
    </div>
    <div class="btn-row">
      <button id="btn-start">Start</button>
      <button id="btn-stop" disabled>Stop</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Chunks</div>
      <div class="value" id="stat-chunks">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Emotion</div>
      <div class="value" id="stat-emotion" style="color:#aaa;">-</div>
    </div>
    <div class="stat-card">
      <div class="label">Confidence</div>
      <div class="value" id="stat-conf" style="color:#aaa;">-</div>
    </div>
  </div>

  <div class="transcript-panel">
    <div class="transcript-header">
      <span>Transcript</span>
      <button id="btn-clear">Clear</button>
    </div>
    <div id="transcript-box">
      <span class="placeholder">Transcript will appear here...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
